# Arquivo Argo CD - descreve a aplicação e o ambiente onde ela será implantada
# O Manifesto do ArgoCD conecta o GitHub ao Cluster de Kubernetes

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minha-app-no-cluster
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/KarolSalvador/lab-gitops-argocd.git
    targetRevision: HEAD
    path: k8s/app-exemplo
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
